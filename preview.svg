    <text x="24" y="42" fill="#5dd6c7" font-family="Segoe UI, Microsoft YaHei, Arial" font-size="13" font-weight="700">SOLAR SYSTEM</text>
    <text x="24" y="82" fill="#f3f7fb" font-family="Segoe UI, Microsoft YaHei, Arial" font-size="30" font-weight="800">二维太阳系模拟</text>
    <text x="24" y="124" fill="#9aa8b6" font-family="Segoe UI, Microsoft YaHei, Arial" font-size="16">速度控制 · 暂停 · 标签 · 轨迹</text>
