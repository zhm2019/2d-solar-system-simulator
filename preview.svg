      <circle cx="-45" cy="54" r="6" fill="#e6c27a"/><text x="-45" y="82">金星</text>
      <circle cx="-59" cy="-75" r="7" fill="#4aa3ff"/><text x="-59" y="-96">地球</text>
      <circle cx="27" cy="110" r="5" fill="#e66b47"/><text x="27" y="136">火星</text>
      <circle cx="156" cy="-107" r="13" fill="#d9a66f"/><text x="156" y="-132">木星</text>
