    <circle cx="312" cy="676" r="1"/><circle cx="486" cy="594" r="1.5"/><circle cx="754" cy="662" r="1"/>
    <circle cx="964" cy="624" r="1.4"/><circle cx="1096" cy="526" r="1"/>
  </g>
  <g transform="translate(520 392)">
