      <stop offset="0%" stop-color="#162034"/>
      <stop offset="54%" stop-color="#07101c"/>
      <stop offset="100%" stop-color="#020308"/>
    </radialGradient>
    <radialGradient id="sun" cx="38%" cy="34%" r="70%">
